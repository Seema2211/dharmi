<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Orders — Dharmi Ice Cream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:    #E91E8C;
      --coral:   #FF6B6B;
      --bg:      #FFF0F7;
      --surface: #FFFFFF;
      --border:  #F2D5E8;
      --text:    #1A0A12;
      --text-2:  #6B4F5E;
      --muted:   #C0A0B4;
      --red:     #EF4444;
      --red-bg:  #FEF2F2;
      --grad:    linear-gradient(135deg, #E91E8C, #FF6B6B);
      --shadow:  0 2px 14px rgba(233,30,140,0.10);
      --r:       12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--grad);
      color: white;
      padding: 13px 16px;
      padding-top: calc(13px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(233,30,140,0.30);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .back-btn {
      background: rgba(255,255,255,0.22);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.35); }

    .header-info { flex: 1; }
    .header-title { font-size: 1rem; font-weight: 800; }
    .header-sub   { font-size: 0.68rem; opacity: 0.85; }

    .refresh-btn {
      background: rgba(255,255,255,0.22);
      border: none;
      color: white;
      padding: 7px 14px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.35); }
    .refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Content ── */
    .content { max-width: 900px; margin: 0 auto; padding: 18px 14px 40px; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 14px 12px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .stat-val {
      font-size: 1.4rem;
      font-weight: 800;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      margin-top: 3px;
      letter-spacing: 0.3px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

    thead { background: var(--grad); color: white; }
    th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr.deleting td   { background: var(--red-bg); transition: background 0.2s; }

    .td-id   { font-weight: 700; color: var(--pink); white-space: nowrap; }
    .td-dt   { color: var(--text-2); font-size: 0.76rem; white-space: nowrap; }
    .td-items{ color: var(--text-2); line-height: 1.5; }
    .td-total{ font-weight: 800; color: var(--pink); white-space: nowrap; }
    .td-acts { white-space: nowrap; }

    /* Action buttons */
    .btn-edit, .btn-del {
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-edit { background: #EDE9FE; color: #7C3AED; margin-right: 6px; }
    .btn-edit:hover { opacity: 0.85; }
    .btn-del  { background: var(--red-bg); color: var(--red); }
    .btn-del:hover { opacity: 0.85; }
    .btn-edit:disabled, .btn-del:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── States ── */
    .state-box { text-align: center; padding: 56px 20px; color: var(--muted); }
    .state-icon{ font-size: 2.8rem; margin-bottom: 10px; }
    .state-msg { font-size: 0.88rem; font-weight: 500; line-height: 1.6; }
    .state-box.error { color: var(--red); }

    /* ── Modal backdrop ── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,10,18,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-bg.open { display: flex; }

    /* ── Edit Modal ── */
    .modal {
      background: var(--surface);
      border-radius: 18px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(233,30,140,0.22);
      overflow: hidden;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .modal-head {
      background: var(--grad);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 1rem; font-weight: 700; }
    .modal-close {
      background: rgba(255,255,255,0.22);
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body { padding: 20px; }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }
    .field textarea, .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.2s;
      outline: none;
      resize: vertical;
    }
    .field textarea:focus, .field input:focus { border-color: var(--pink); }
    .field textarea { min-height: 90px; }

    .modal-foot {
      padding: 0 20px 20px;
      display: flex;
      gap: 10px;
    }

    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--pink); color: var(--pink); }

    .btn-save {
      flex: 2;
      padding: 12px;
      background: var(--grad);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(233,30,140,0.35);
      transition: opacity 0.2s;
    }
    .btn-save:hover   { opacity: 0.88; }
    .btn-save:disabled{ opacity: 0.5; cursor: not-allowed; }

    /* ── Delete Confirm Modal ── */
    .del-modal {
      background: var(--surface);
      border-radius: 18px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(239,68,68,0.20);
      overflow: hidden;
      animation: slideUp 0.25s ease;
      text-align: center;
      padding: 28px 24px 24px;
    }

    .del-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .del-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .del-msg   { font-size: 0.82rem; color: var(--text-2); margin-bottom: 22px; line-height: 1.6; }

    .del-actions { display: flex; gap: 10px; }

    .btn-del-cancel {
      flex: 1;
      padding: 12px;
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-del-cancel:hover { border-color: var(--pink); color: var(--pink); }

    .btn-del-confirm {
      flex: 1;
      padding: 12px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(239,68,68,0.35);
      transition: opacity 0.2s;
    }
    .btn-del-confirm:hover    { opacity: 0.88; }
    .btn-del-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: #1A0A12EE;
      color: white;
      padding: 11px 26px;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Mobile ── */
    @media (max-width: 560px) {
      .stats { gap: 8px; }
      .stat-val { font-size: 1.15rem; }
      .stat-label { font-size: 0.62rem; }
      th:nth-child(2), td:nth-child(2) { display: none; }
      .btn-edit, .btn-del { padding: 6px 9px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a class="back-btn" href="/" title="Back to POS">&#8592;</a>
    <div class="header-info">
      <div class="header-title">🍦 Orders History</div>
      <div class="header-sub">Dharmi Ice Cream &amp; Kulfi</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadOrders()">&#8635; Refresh</button>
  </header>

  <div class="content">

    <div class="stats" id="stats" style="display:none">
      <div class="stat-card">
        <div class="stat-val" id="stat-count">0</div>
        <div class="stat-label">Total Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-revenue">₹0</div>
        <div class="stat-label">Total Revenue</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-avg">₹0</div>
        <div class="stat-label">Avg Order Value</div>
      </div>
    </div>

    <div class="table-wrap" id="table-wrap">
      <div class="state-box">
        <div class="state-icon">⏳</div>
        <div class="state-msg">Loading orders…</div>
      </div>
    </div>

  </div>

  <!-- ── Edit Modal ── -->
  <div class="modal-bg" id="edit-modal-bg">
    <div class="modal">
      <div class="modal-head">
        <span class="modal-title" id="edit-modal-title">Edit Order</span>
        <button class="modal-close" onclick="closeEditModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Items</label>
          <textarea id="edit-items" placeholder="e.g. Kaju Anjir x2, Mango Kulfi x1"></textarea>
        </div>
        <div class="field">
          <label>Total Amount (₹)</label>
          <input type="number" id="edit-total" min="0" placeholder="e.g. 165" />
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
        <button class="btn-save" id="btn-save" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ── Delete Confirm Modal ── -->
  <div class="modal-bg" id="del-modal-bg">
    <div class="del-modal">
      <div class="del-icon">🗑️</div>
      <div class="del-title" id="del-modal-title">Delete Order?</div>
      <div class="del-msg">This will permanently remove the order from Google Sheets and cannot be undone.</div>
      <div class="del-actions">
        <button class="btn-del-cancel" onclick="closeDelModal()">Cancel</button>
        <button class="btn-del-confirm" id="btn-del-confirm" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let allOrders = [];
    let editingOrderId = null;
    let deletingOrderId = null;

    /* ── Load ── */
    async function loadOrders() {
      const wrap = document.getElementById('table-wrap');
      const btn  = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Loading…';
      document.getElementById('stats').style.display = 'none';
      wrap.innerHTML = `<div class="state-box"><div class="state-icon">⏳</div><div class="state-msg">Loading orders…</div></div>`;

      try {
        const res = await fetch('/api/orders');
        if (!res.ok) throw new Error();
        allOrders = await res.json();
        renderTable();
      } catch {
        wrap.innerHTML = `<div class="state-box error"><div class="state-icon">❌</div><div class="state-msg">Could not load orders.<br/>Check your Google Sheets credentials.</div></div>`;
      }

      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }

    /* ── Render Table ── */
    function renderTable() {
      const wrap = document.getElementById('table-wrap');

      if (allOrders.length === 0) {
        wrap.innerHTML = `<div class="state-box"><div class="state-icon">🍧</div><div class="state-msg">No orders yet.<br/>Place your first order from the POS.</div></div>`;
        return;
      }

      // Stats
      const revenue = allOrders.reduce((s, o) => s + Number(o.total || 0), 0);
      document.getElementById('stat-count').textContent   = allOrders.length;
      document.getElementById('stat-revenue').textContent = `₹${revenue}`;
      document.getElementById('stat-avg').textContent     = `₹${Math.round(revenue / allOrders.length)}`;
      document.getElementById('stats').style.display      = 'grid';

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#Order</th>
              <th>Date &amp; Time</th>
              <th>Items</th>
              <th>Total</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            ${allOrders.map(o => orderRow(o)).join('')}
          </tbody>
        </table>`;
    }

    function orderRow(o) {
      return `
        <tr id="row-${o.orderId}">
          <td class="td-id">#${o.orderId}</td>
          <td class="td-dt">${o.dateTime}</td>
          <td class="td-items">${o.items}</td>
          <td class="td-total">₹${o.total}</td>
          <td class="td-acts">
            <button class="btn-edit" onclick="openEditModal('${o.orderId}')">✏️ Edit</button>
            <button class="btn-del"  onclick="openDelModal('${o.orderId}')">🗑️ Delete</button>
          </td>
        </tr>`;
    }

    /* ════════════════════
       EDIT
    ════════════════════ */
    function openEditModal(orderId) {
      const order = allOrders.find(o => String(o.orderId) === String(orderId));
      if (!order) return;
      editingOrderId = orderId;

      document.getElementById('edit-modal-title').textContent = `Edit Order #${orderId}`;
      document.getElementById('edit-items').value  = order.items;
      document.getElementById('edit-total').value  = order.total;
      document.getElementById('edit-modal-bg').classList.add('open');
    }

    function closeEditModal() {
      document.getElementById('edit-modal-bg').classList.remove('open');
      editingOrderId = null;
    }

    async function saveEdit() {
      const items = document.getElementById('edit-items').value.trim();
      const total = document.getElementById('edit-total').value.trim();
      if (!items || !total) { showToast('⚠️ Items and total are required'); return; }

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const res = await fetch('/api/update-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: editingOrderId, items, total: Number(total) }),
        });
        if (!res.ok) throw new Error();

        // Update local data + re-render row in place
        const order = allOrders.find(o => String(o.orderId) === String(editingOrderId));
        if (order) { order.items = items; order.total = total; }

        const row = document.getElementById(`row-${editingOrderId}`);
        if (row) row.outerHTML = orderRow({ orderId: editingOrderId, dateTime: order.dateTime, items, total });

        closeEditModal();
        showToast(`✅ Order #${editingOrderId} updated in Google Sheets`);
      } catch {
        showToast('❌ Failed to update order. Try again.');
      }

      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }

    /* ════════════════════
       DELETE
    ════════════════════ */
    function openDelModal(orderId) {
      deletingOrderId = orderId;
      document.getElementById('del-modal-title').textContent = `Delete Order #${orderId}?`;
      document.getElementById('del-modal-bg').classList.add('open');
    }

    function closeDelModal() {
      document.getElementById('del-modal-bg').classList.remove('open');
      deletingOrderId = null;
    }

    async function confirmDelete() {
      const btn = document.getElementById('btn-del-confirm');
      btn.disabled = true;
      btn.textContent = 'Deleting…';

      // Highlight the row being deleted
      const row = document.getElementById(`row-${deletingOrderId}`);
      if (row) row.classList.add('deleting');

      try {
        const res = await fetch('/api/delete-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId: deletingOrderId }),
        });
        if (!res.ok) throw new Error();

        // Remove from local array + DOM
        allOrders = allOrders.filter(o => String(o.orderId) !== String(deletingOrderId));
        if (row) row.remove();

        // Re-render if table is now empty, or update stats
        if (allOrders.length === 0) {
          renderTable();
        } else {
          const revenue = allOrders.reduce((s, o) => s + Number(o.total || 0), 0);
          document.getElementById('stat-count').textContent   = allOrders.length;
          document.getElementById('stat-revenue').textContent = `₹${revenue}`;
          document.getElementById('stat-avg').textContent     = `₹${Math.round(revenue / allOrders.length)}`;
        }

        closeDelModal();
        showToast(`🗑️ Order #${deletingOrderId} deleted from Google Sheets`);
      } catch {
        if (row) row.classList.remove('deleting');
        showToast('❌ Failed to delete order. Try again.');
      }

      btn.disabled = false;
      btn.textContent = 'Delete';
    }

    /* ── Toast ── */
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // Close modals on backdrop click
    document.getElementById('edit-modal-bg').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeEditModal();
    });
    document.getElementById('del-modal-bg').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDelModal();
    });

    loadOrders();
  </script>

</body>
</html>
