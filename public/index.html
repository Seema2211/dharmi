<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dharmi Ice Cream &amp; Kulfi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <span class="header-icon">🍦</span>
    <div class="header-text">
      <div class="header-title">Dharmi Ice Cream &amp; Kulfi</div>
      <div class="header-sub">Fresh &amp; Delicious Every Day</div>
    </div>
    <a class="orders-link" href="/orders.html">📋 Orders</a>
  </header>

  <div class="app">

    <!-- Menu Panel (full width on mobile) -->
    <div class="menu-panel">
      <div class="categories" id="categories"></div>
      <div class="items-grid" id="items-grid"></div>
    </div>

    <!-- Desktop: sidebar order panel -->
    <div class="order-panel" id="order-panel">

      <div class="sheet-handle"></div>

      <div class="order-head">
        <span class="order-title">🛒 Current Order</span>
        <div class="order-head-actions">
          <span class="order-badge" id="order-badge"></span>
          <button class="close-btn" onclick="closeSheet()" aria-label="Close">✕</button>
        </div>
      </div>

      <div class="order-list" id="order-list">
        <div class="empty-state">
          <div class="empty-icon">🍧</div>
          <div class="empty-msg">Tap items to add<br/>to your order</div>
        </div>
      </div>

      <div class="order-foot">
        <div class="total-row">
          <span class="total-label">Total Amount</span>
          <span class="total-val" id="total-val">₹0</span>
        </div>
        <button class="btn-place" id="btn-place" onclick="placeOrder()" disabled>
          Place Order
        </button>
        <button class="btn-clear" onclick="clearOrder()">Clear Order</button>
      </div>

    </div>
  </div>

  <!-- Mobile only: backdrop + cart bar -->
  <div class="backdrop" id="backdrop" onclick="closeSheet()"></div>

  <div class="cart-bar" id="cart-bar" onclick="openSheet()">
    <div class="cart-bar-left">
      <span class="cart-bar-icon">🛒</span>
      <span id="cart-bar-count">0 items</span>
    </div>
    <div class="cart-bar-right">
      <strong id="cart-bar-total">₹0</strong>
      <span class="cart-bar-cta">View Order ›</span>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
